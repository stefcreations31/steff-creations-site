<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <rect width="400" height="400" fill="url(#grad)"/>
  
  <!-- Bordure dorée -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#C9A227" stroke-width="3"/>
  
  <!-- Diamant stylisé -->
  <path d="M 200 120 L 240 160 L 220 220 L 180 220 L 160 160 Z" fill="#C9A227" opacity="0.8"/>
  
  <!-- Texte -->
  <text x="200" y="270" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#C9A227" text-anchor="middle">Stef Créations</text>
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Photo à venir</text>
</svg>
